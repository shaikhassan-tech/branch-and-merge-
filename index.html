<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛒 Simple Shop</h1>
    <button onclick="viewCart()">Cart (<span id="cart-count">0</span>)</button>
</header>

<section class="products">
    <div class="product">
        <h3>Product 1</h3>
        <p>₹500</p>
        <button onclick="addToCart('Product 1', 500)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Product 2</h3>
        <p>₹800</p>
        <button onclick="addToCart('Product 2', 800)">Add to Cart</button>
    </div>
</section>

<section id="cart-section" class="hidden">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button onclick="checkout()">Proceed to Payment</button>
</section>

<script src="cart.js"></script>
<script src="payment.js"></script>

</body>
</html>
